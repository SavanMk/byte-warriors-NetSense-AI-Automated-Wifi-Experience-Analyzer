<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetSense AI</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.dashboard {
    height: auto;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 20px;
    border: 0.5px solid rgba(80, 198, 139, 0.4);
    box-shadow: 0 0 25px rgba(80, 198, 139, 0.15);    width: 420px;
    text-align: center;
}

.subtitle {
    color: #facc15;
    font-size: 22px;
    margin-bottom: 25px;
    text-shadow: 0 0 10px rgba(250,204,21,0.6);
}

.metric {
    background: linear-gradient(
        to right,
        rgba(15, 23, 42, 0.7),
        rgba(15, 23, 42, 0.5)
    );
    margin: 15px 0;
    padding: 16px;
    border-radius: 10px;
    border-left: 3px solid #3b82f6;

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.metric:hover {
    transform: translateY(-3px);

    /* glow effect */
    box-shadow:
        0 0 10px rgba(59, 130, 246, 0.6),
        0 0 20px rgba(59, 130, 246, 0.4),
        0 0 30px rgba(59, 130, 246, 0.2);
}

.metric:hover {
    transform: scale(1.03);

.metric:hover {
    transform: translateY(-4px);

    box-shadow:
        0 0 12px rgba(59, 130, 246, 0.6),
        0 0 25px rgba(59, 130, 246, 0.4);

    border-left: 3px solid #60a5fa;
}

.metric:hover::before {
    opacity: 1;
}    
}

.metric h3 {
    font-size: 12px;
    color: #94a3b8;
    margin: 0;
}

.metric p {
    font-size: 26px;
    margin: 6px 0 0;
    text-shadow: 0 0 6px rgba(255,255,255,0.2);
    font: weight 600px;
    color: #f1f5f9;
}

.status {
    margin-top: 18px;
    font-size: 14px;
    color: #4ade80;
}

.dashboard {
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.time {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 5px;
}

.logo {
    width: 130px;
    margin-bottom: 12px;
    border-radius: 10px;
    filter: drop-shadow(0 0 6px rgba(80, 198, 139, 0.4));
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="dashboard">

   <img src="logo.png" class="logo">

    <div class="subtitle"><b>Automated WiFi Analyzer</b></div>

    <div class="metric">
        <h3>Download Speed</h3>
        <p id="download">0 Mbps</p>
    </div>

    <div class="metric">
        <h3>Upload Speed</h3>
        <p id="upload">0 Mbps</p>
    </div>

    <div class="metric">
        <h3>Latency</h3>
        <p id="ping">0 ms</p>
    </div>

    <div class="status">🟢 Static Mode (Frontend Only)</div>
    <div class="time" id="time"></div>

</div>

<script>
// 🎬 Animate values
function animate(id, value, unit) {
    let start = 0;
    let duration = 800;
    let startTime = null;

    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        let progress = Math.min((timestamp - startTime) / duration, 1);
        let current = (progress * value).toFixed(2);
        document.getElementById(id).innerText = current + " " + unit;

        if (progress < 1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

// 🎨 Color logic
function setColor(id, value, type) {
    let el = document.getElementById(id);

    if (type === "download") {
        el.style.color = value > 100 ? "#22c55e" : value > 50 ? "#facc15" : "#ef4444";
    }
    if (type === "upload") {
        el.style.color = value > 20 ? "#22c55e" : value > 10 ? "#facc15" : "#ef4444";
    }
    if (type === "ping") {
        el.style.color = value < 30 ? "#22c55e" : value < 60 ? "#facc15" : "#ef4444";
    }
}

async function fetchMetrics() {
    try {
        const res = await fetch('metrics.json?t=' + new Date().getTime());
        const data = await res.json();

        // Update UI with real values
        animate("download", data.download, "Mbps");
        animate("upload", data.upload, "Mbps");
        animate("ping", data.ping, "ms");

        setColor("download", data.download, "download");
        setColor("upload", data.upload, "upload");
        setColor("ping", data.ping, "ping");

        document.querySelector(".status").innerText = "🟢 Live Data";
        document.getElementById("time").innerText =
            "Updated: " + data.timestamp;

    } catch (err) {
        console.error(err);
        document.querySelector(".status").innerText = "🔴 Error";
    }
}
window.onload = fetchMetrics;
setInterval(fetchMetrics, 5000);


// Run on load
window.onload = () => {
    animate("download", data.download, "Mbps");
    animate("upload", data.upload, "Mbps");
    animate("ping", data.ping, "ms");

    setColor("download", data.download, "download");
    setColor("upload", data.upload, "upload");
    setColor("ping", data.ping, "ping");

    // Show time
    document.getElementById("time").innerText =
        "Updated: " + new Date().toLocaleTimeString();
};
</script>

</body>
</html>
